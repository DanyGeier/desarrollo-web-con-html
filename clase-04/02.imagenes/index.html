<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <h1>Imagenes</h1>
    <hr> <!-- Horizontal rule -->

    <!-- ! Imagenes sin derecho de autor -->

    <!-- https://unsplash.com/es -->
    <!-- https://pixabay.com/es/ -->
    <!-- https://www.pexels.com/es-es/ -->
    <!-- https://picjumbo.com/ -->

    <!-- Para trabajar con imagenes tengo que tener en cuenta las siguietes 3 cosas -->

    <!-- ! Resolución (pixeles) -> widht | height -->
    <!-- Resolución va a depender de el tamaño que tiene que tener la imagen en mi sitio -->
    <!-- ! Tamaño (MB, KB) -> Peso (Tamaño que ocupa en disco)-->
    <!-- jpg | png | gif | webp | svg -->
    <!-- bitmap -> (las imagenes por pixeles) jpg, png, gif, webp -->
    <!-- jpg -> Es el formato más usado (El mejor compresión del 3 mencionamos)  NO Transparencias, ni animaciones -->
    <!-- png -> Es un formato que tiene menos compresión (ocupa más en disco) admite transparencia (canal alpha)-->
    <!-- gif -> Es un formato no tan bueno en compresión, pero admite transparencias y animaciones-->
    <!-- webp -> (formato de google) mejor compresión que jpg, admite transparencias y admite animaciones -->

    <!-- <img src="" alt= "" title="" loading="lazy"> -->
    <!-- alt -> texto alternativo (Una descripción de la imagen) -> para las personas que no ven la imagen--> 
    <!-- src -> obligatorio (es la ruta a donde está la imagen)-->
    <!-- title -> es un pequeño tooltip con info sobre la imagen -->
    <!-- loading -> Es una carga de la imagen demorada -> perezosa -->
    <!-- <img src="" alt="" title"" loading="lazy"> -->

    <!-- optimizar imagenes -->
    
    <!-- Con la etiqueta <img> (Imagen como contenido)-->

    <!-- ! Imagenes que Google, Yahoo, Duck Duck Go, indexan-->

    <img src="imgs/chocolate.jpg" alt="Es una imagen de un chocolate">

    <img src="imgs/chocolate.jpg" width="200px" alt="Es una imagen de un chocolate"> 

    <img src="imgs/chocolate.webp" alt="Es una imagen de un chocolate">

    <!-- Imagenes decorativas (css)-->

    <!-- Contenedor generico, no tiene peso semantico (Buscadores, no le dan ninguna importancia semantica respecto al resto de las etiquetas)-->

    <div class="fondo">Caramelos</div>

</body>
</html>
