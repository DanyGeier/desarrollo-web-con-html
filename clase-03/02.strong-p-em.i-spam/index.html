<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajando con etiquetas Strong|p|em|i|span</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <h1>Trabajando con etiquetas Strong|p|em|i|span</h1>

    <hr>

    <!-- Deprecadas las etiquetas b e i -->
    <!-- Visualmente ogran el mismo efecto strong y el b (Ponen lo que vuelve en negrita) -->
    <!-- Visualmente logran el mismo efecto em y el i (Ponen lo que envuelve en cursiva (italica)) -->
    <!-- Strong y em además del efecto visual, le agregan un significado a lo que envuelve. (Potencian el significado de lo que envuelven) -->

    <!-- span, es una etiqueta en linea generica. -->
    <!-- El span, no le agrega nada visual, ni tiene significado extra. -->

    <!-- Las etiquetas están divididas en 2 grupos. Etiquetas en linea y etiquetas en bloque -->

    <!-- Etiquetas en linea -->
    <!-- strong -> Es darle un enfasis fuerte/importante -->
    <!-- indica importancia real -->
    <!-- algo que debe destacarse conceptualmente -->
    <!-- Los lectores de pantalla lo leen con énfasis -->
    <!-- Los buscadores lo interpretan como contenido relevante -->

    <!-- Visual y semantico -->
    <p>Este dato es <strong>crítico</strong> para el sistema</p>

    <!-- Visual-->
    <p>Este dato es <b>crítico</b> para el sistema</p>

    <!-- ! Elemento de bloque-->
    <!-- un elemento de bolque no puede tener otro elemento de bloque dentro-->
    <!-- un elemento de bloque si puede tener elementos de línea -->
    <!-- p*4 -->
     <!--
    <p></p>
    <p></p>
    <p></p>
    <p></p>
    -->

    <!-- ! Elemento de línea -->
    <!-- elementos de linea si pueden contener elementos de linea -->

    <!-- strong*4 -->
    <!--<strong></strong><strong></strong><strong></strong><strong></strong> -->

    <p>Hola <strong>esto es</strong> un <strong>elemento de linea</strong></p>

    <!-- ! Trabajando con SPAN-->


</body>
</html>
